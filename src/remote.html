<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#11111b">
  <title>Presentation Remote</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #11111b;
      --surface: #1e1e2e;
      --border:  #313244;
      --text:    #cdd6f4;
      --sub:     #bac2de;
      --muted:   #6c7086;
      --accent:  #4f46e5;
      --green:   #a6e3a1;
      --yellow:  #f9e2af;
      --red:     #f38ba8;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, "Inter", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── CONNECT SCREEN ───────────────────────────────────────────────── */
    #connect-screen {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      gap: 0.8rem;
      text-align: center;
    }

    .logo {
      font-size: 1.6rem;
      font-weight: 200;
      letter-spacing: -0.04em;
      color: var(--text);
      margin-bottom: 0.2rem;
    }
    .logo span { color: var(--accent); }

    .subtitle {
      color: var(--muted);
      font-size: 0.84rem;
      margin-bottom: 0.6rem;
    }

    .form-group {
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    input[type="password"] {
      padding: 0.9rem 1rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      width: 100%;
      -webkit-appearance: none;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
    }

    .btn-primary {
      padding: 0.9rem;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      -webkit-appearance: none;
      transition: opacity 0.15s;
    }
    .btn-primary:active { opacity: 0.78; }
    .btn-primary:disabled { opacity: 0.45; cursor: default; }

    #status-msg {
      font-size: 0.82rem;
      color: var(--yellow);
      min-height: 1.2em;
    }
    #status-msg.error   { color: var(--red); }
    #status-msg.success { color: var(--green); }

    /* ── CONTROL SCREEN ───────────────────────────────────────────────── */
    #control-screen {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* Slide header */
    #slide-header {
      flex-shrink: 0;
      padding: 0.9rem 1.2rem 0.75rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    #slide-progress {
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.25rem;
    }
    #slide-title {
      font-size: 0.97rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Progress bar */
    #progress-bar {
      flex-shrink: 0;
      height: 3px;
      background: var(--border);
    }
    #progress-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.35s ease;
    }

    /* Speaker notes */
    #notes-area {
      flex: 1;
      overflow-y: auto;
      padding: 1.2rem 1.2rem 0.8rem;
      font-size: 0.9rem;
      line-height: 1.75;
      color: var(--sub);
      -webkit-overflow-scrolling: touch;
    }
    #notes-area p { margin-bottom: 0.75rem; }
    #notes-area p:last-child { margin-bottom: 0; }
    #notes-area.empty {
      color: var(--muted);
      font-style: italic;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Navigation */
    #nav-bar {
      flex-shrink: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-top: 1px solid var(--border);
    }
    .nav-btn {
      padding: 1.3rem 1rem;
      background: var(--surface);
      border: none;
      color: var(--text);
      font-size: 1.3rem;
      cursor: pointer;
      -webkit-appearance: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      transition: background 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    #prev-btn { border-right: 1px solid var(--border); }
    .nav-btn:active { background: var(--border); }
    .nav-btn:disabled { color: var(--muted); opacity: 0.35; }

    .nav-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 500;
    }

    /* Disconnected banner */
    #disconnected-banner {
      flex-shrink: 0;
      background: rgba(243, 139, 168, 0.12);
      border-top: 1px solid rgba(243, 139, 168, 0.25);
      color: var(--red);
      font-size: 0.78rem;
      text-align: center;
      padding: 0.55rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>

  <!-- ── CONNECT SCREEN ─────────────────────────────────────────────────── -->
  <div id="connect-screen">
    <div class="logo">Presentation <span>Remote</span></div>
    <div class="subtitle">Enter the session password to connect</div>
    <div class="form-group">
      <input
        id="pw-input"
        type="password"
        placeholder="Session password"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false">
      <button id="connect-btn" class="btn-primary">Connect</button>
      <div id="status-msg"></div>
    </div>
  </div>

  <!-- ── CONTROL SCREEN (shown after connecting) ────────────────────────── -->
  <div id="control-screen" style="display:none">
    <div id="slide-header">
      <div id="slide-progress">Slide &mdash; / &mdash;</div>
      <div id="slide-title">Connecting&hellip;</div>
    </div>

    <div id="progress-bar">
      <div id="progress-fill" style="width:0%"></div>
    </div>

    <div id="notes-area" class="empty">No speaker notes for this slide.</div>

    <div id="nav-bar">
      <button id="prev-btn" class="nav-btn" disabled>
        <span>&#8592;</span>
        <span class="nav-label">Prev</span>
      </button>
      <button id="next-btn" class="nav-btn">
        <span class="nav-label">Next</span>
        <span>&#8594;</span>
      </button>
    </div>

    <div id="disconnected-banner" style="display:none">
      Disconnected &mdash; tap to reconnect
    </div>
  </div>

  <!-- ── PEERJS ─────────────────────────────────────────────────────────── -->
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script>
  /* global Peer */
  (function () {
    'use strict';

    /* ── ICE / TURN CONFIG ──────────────────────────────────────────────── */
    var PEER_ICE_CONFIG = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        {
          urls: [
            'turn:openrelay.metered.ca:80',
            'turn:openrelay.metered.ca:443',
            'turns:openrelay.metered.ca:443'
          ],
          username: 'openrelayproject',
          credential: 'openrelayproject'
        }
      ]
    };

    /* ── SAME HASH AS PRESENTER ─────────────────────────────────────────── */
    function toPeerId(password) {
      var data = new TextEncoder().encode('openclaw-rc-v1:' + password);
      return crypto.subtle.digest('SHA-256', data).then(function (buf) {
        var hex = Array.from(new Uint8Array(buf))
          .map(function (b) { return b.toString(16).padStart(2, '0'); })
          .join('');
        return 'ocl-' + hex.slice(0, 20);
      });
    }

    /* ── ELEMENTS ────────────────────────────────────────────────────────── */
    var pwInput           = document.getElementById('pw-input');
    var connectBtn        = document.getElementById('connect-btn');
    var statusMsg         = document.getElementById('status-msg');
    var connectScreen     = document.getElementById('connect-screen');
    var controlScreen     = document.getElementById('control-screen');
    var slideProgress     = document.getElementById('slide-progress');
    var slideTitle        = document.getElementById('slide-title');
    var notesArea         = document.getElementById('notes-area');
    var progressFill      = document.getElementById('progress-fill');
    var prevBtn           = document.getElementById('prev-btn');
    var nextBtn           = document.getElementById('next-btn');
    var disconnectedBanner= document.getElementById('disconnected-banner');

    /* ── STATE ───────────────────────────────────────────────────────────── */
    var peer          = null;
    var conn          = null;
    var savedPw       = '';
    var reconnectTimer = null;
    var reconnectDelay = 3000; /* ms, doubles on each failure up to 30 s */

    /* ── AUTO-FILL PASSWORD FROM URL ─────────────────────────────────────── */
    var urlPw = new URLSearchParams(window.location.search).get('pw');
    if (urlPw) {
      pwInput.value = urlPw;
      setTimeout(function () { connectBtn.click(); }, 400);
    }

    /* ── UPDATE SLIDE UI ─────────────────────────────────────────────────── */
    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;')
              .replace(/</g, '&lt;')
              .replace(/>/g, '&gt;')
              .replace(/"/g, '&quot;');
    }

    function updateSlide(data) {
      slideProgress.textContent = 'Slide ' + data.index + ' / ' + data.total;
      slideTitle.textContent    = data.title || '(no title)';
      progressFill.style.width  = ((data.index / data.total) * 100) + '%';

      if (data.notes && data.notes.trim()) {
        var html = data.notes
          .split(/\n\n+/)
          .map(function (para) {
            return '<p>' + escapeHtml(para).replace(/\n/g, '<br>') + '</p>';
          })
          .join('');
        notesArea.innerHTML = html;
        notesArea.classList.remove('empty');
      } else {
        notesArea.textContent = 'No speaker notes for this slide.';
        notesArea.classList.add('empty');
      }

      prevBtn.disabled = data.index <= 1;
      nextBtn.disabled = data.index >= data.total;
      notesArea.scrollTop = 0;
    }

    /* ── SEND COMMAND ────────────────────────────────────────────────────── */
    function send(data) {
      if (conn && conn.open) conn.send(data);
    }

    /* ── CHALLENGE-RESPONSE AUTH HELPER ────────────────────────────────── */
    function computeResponse(nonce, password) {
      var data = new TextEncoder().encode(nonce + ':openclaw-rc-auth:' + password);
      return crypto.subtle.digest('SHA-256', data).then(function (buf) {
        return Array.from(new Uint8Array(buf))
          .map(function (b) { return b.toString(16).padStart(2, '0'); })
          .join('');
      });
    }

    /* ── CONNECT ─────────────────────────────────────────────────────────── */
    /* Returns a Promise<boolean>: true = auth succeeded, false = not yet */
    function connect(password) {
      savedPw = password;
      connectBtn.disabled = true;
      if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }

      if (peer) { try { peer.destroy(); } catch (e) {} }

      return new Promise(function (resolve) {
        toPeerId(password).then(function (presenterId) {
          peer = new Peer({ debug: 0, config: PEER_ICE_CONFIG });

          peer.on('error', function (err) {
            if (err.type === 'peer-unavailable') {
              /* Presenter not online yet — caller will retry */
              resolve(false);
            } else {
              setStatus('Error: ' + (err.message || err.type), 'error');
              connectBtn.disabled = false;
              resolve(false);
            }
          });

        peer.on('open', function () {
          conn = peer.connect(presenterId, { reliable: true });

          var authed = false;

          conn.on('open', function () {
            disconnectedBanner.style.display = 'none';
            setStatus('Waiting for presenter to connect…', '');
          });

          conn.on('data', function (data) {
            /* ── Respond to challenge ── */
            if (data.type === 'challenge') {
              computeResponse(data.nonce, savedPw).then(function (response) {
                conn.send({ type: 'auth', response: response });
              });
              return;
            }

            /* ── Session full — another device is already connected ── */
            if (data.type === 'full') {
              setStatus('Session is full — another device is already connected.', 'error');
              connectBtn.disabled = false;
              resolve(false);
              return;
            }

            /* ── First slide packet = authentication succeeded ── */
            if (data.type === 'slide') {
              if (!authed) {
                authed = true;
                reconnectDelay = 3000; /* reset backoff */
                setStatus('Presenter connected', 'success');
                setTimeout(function () {
                  connectScreen.style.display      = 'none';
                  controlScreen.style.display      = 'flex';
                  disconnectedBanner.style.display = 'none';
                }, 600);
                resolve(true);
              }
              updateSlide(data);
            }
          });

          conn.on('close', function () {
            if (!authed) {
              /* Closed before slide data arrived = wrong password */
              setStatus('This presentation is controlled by the presenter. Access denied.', 'error');
              connectBtn.disabled = false;
              resolve(false);
            } else {
              scheduleReconnect();
            }
          });

          conn.on('error', function () {
            if (!authed) {
              setStatus('This presentation is controlled by the presenter. Access denied.', 'error');
              connectBtn.disabled = false;
              resolve(false);
            } else {
              scheduleReconnect();
            }
          });
        });
      });
      }); /* end Promise */
    }

    function setStatus(msg, cls) {
      statusMsg.textContent = msg;
      statusMsg.className   = cls || '';
    }

    /* ── AUTO-RECONNECT ─────────────────────────────────────────────────── */
    function scheduleReconnect() {
      if (reconnectTimer) clearTimeout(reconnectTimer);
      if (!savedPw) return;

      var secs = Math.round(reconnectDelay / 1000);
      disconnectedBanner.textContent = 'Disconnected — reconnecting in ' + secs + 's…';
      disconnectedBanner.style.display = 'block';

      /* Countdown display */
      var remaining = secs;
      var countdownInterval = setInterval(function () {
        remaining--;
        if (remaining > 0) {
          disconnectedBanner.textContent = 'Disconnected — reconnecting in ' + remaining + 's…';
        } else {
          clearInterval(countdownInterval);
        }
      }, 1000);

      reconnectTimer = setTimeout(function () {
        clearInterval(countdownInterval);
        disconnectedBanner.textContent = 'Reconnecting…';
        connect(savedPw).then(function (succeeded) {
          if (succeeded) {
            reconnectDelay = 3000; /* reset backoff on success */
          } else {
            /* Presenter not back yet — back off and try again */
            reconnectDelay = Math.min(reconnectDelay * 2, 30000);
            scheduleReconnect();
          }
        });
      }, reconnectDelay);
    }

    /* ── EVENT LISTENERS ─────────────────────────────────────────────────── */
    connectBtn.addEventListener('click', function () {
      var pw = pwInput.value.trim();
      if (!pw) { pwInput.focus(); return; }
      reconnectDelay = 3000; /* reset backoff for fresh manual connect */
      connect(pw);
    });

    pwInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') connectBtn.click();
    });

    prevBtn.addEventListener('click', function () { send({ cmd: 'prev' }); });
    nextBtn.addEventListener('click', function () { send({ cmd: 'next' }); });

    /* Banner tap cancels the auto-reconnect timer and retries immediately */
    disconnectedBanner.addEventListener('click', function () {
      if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
      reconnectDelay = 3000;
      if (savedPw) connect(savedPw);
    });

    /* ── KEYBOARD (e.g. Bluetooth clicker when using phone as secondary screen) */
    document.addEventListener('keydown', function (e) {
      if (controlScreen.style.display === 'none') return;
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); send({ cmd: 'next' }); }
      if (e.key === 'ArrowLeft')                   { e.preventDefault(); send({ cmd: 'prev' }); }
    });

    /* ── SWIPE on nav bar (horizontal = prev/next) ───────────────────────── */
    var swipeStartX = 0;
    var navBar = document.getElementById('nav-bar');
    navBar.addEventListener('touchstart', function (e) {
      swipeStartX = e.touches[0].clientX;
    }, { passive: true });
    navBar.addEventListener('touchend', function (e) {
      var dx = e.changedTouches[0].clientX - swipeStartX;
      if (Math.abs(dx) > 60) {
        send({ cmd: dx < 0 ? 'next' : 'prev' });
      }
    }, { passive: true });

  }());
  </script>
</body>
</html>
